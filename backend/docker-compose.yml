services:
  db:
    image: mysql:8.0
    container_name: zal_db
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: zal_db
    ports:
      - "3306:3306"
    volumes:
      - zal_db_data:/var/lib/mysql
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: zal_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: zal_db
      DB_USER: root
      DB_PASSWORD: root
      JWT_ACCESS_SECRET: change_me_in_production
      FRONTEND_URL: http://localhost:5173
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3001:3001"

volumes:
  zal_db_data:
